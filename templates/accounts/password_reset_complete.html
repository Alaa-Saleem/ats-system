<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اكتمل التغيير | نظام التوظيف</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .login-header h2 { font-weight: 700; color: #2ecc71; font-size: 28px; margin-bottom: 10px; }
        .login-header p { color: #7f8c8d; font-size: 15px; margin-bottom: 20px; line-height: 1.6; }
        .btn-primary { background: #3498db; border: none; border-radius: 10px; padding: 12px; font-weight: 600; font-size: 16px; transition: background 0.3s; }
        .btn-primary:hover { background: #2980b9; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h2>تم بنجاح!</h2>
        <p>تم تغيير كلمة المرور الخاصة بك بنجاح. يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة الخاصة بك.</p>
    </div>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 shadow-sm mt-3">الذهاب لتسجيل الدخول</a>
</div>
</body>
</html>
