<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الإرسال بنجاح — ATS Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: #1B75BC; --blue-dark: #1460A0; --blue-light: #3B92D8;
            --blue-soft: rgba(27, 117, 188, 0.1); --green: #10B981;
            --bg: #F0F4FA; --surface: #FFFFFF;
            --text: #0A1628; --muted: #6B7A99; --border: #DDE4F0;
            --shadow: 0 20px 60px rgba(10, 22, 40, 0.12);
            --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .auth-card { background: var(--surface); border-radius: 24px; box-shadow: var(--shadow); width: 100%; max-width: 460px; overflow: hidden; text-align: center; }
        .auth-card-top { height: 5px; background: linear-gradient(90deg, var(--green) 0%, #34D399 100%); }
        .auth-card-body { padding: 52px 44px 44px; }
        .success-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(16, 185, 129, 0.1); color: var(--green);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 24px;
            border: 2px solid rgba(16, 185, 129, 0.2);
        }
        h1 { font-size: 1.55rem; font-weight: 800; color: var(--text); margin-bottom: 12px; }
        p { color: var(--muted); font-size: 0.92rem; line-height: 1.7; margin-bottom: 32px; }
        .btn-back {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 14px 32px; background: var(--blue); color: #fff;
            border: none; border-radius: 12px;
            font-family: 'Cairo', sans-serif; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: var(--transition); text-decoration: none;
            box-shadow: 0 4px 16px rgba(27, 117, 188, 0.3);
        }
        .btn-back:hover { background: var(--blue-dark); transform: translateY(-1px); color: #fff; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-card-top"></div>
    <div class="auth-card-body">
        <div class="success-icon"><i class="fas fa-envelope-circle-check"></i></div>
        <h1>تم الإرسال بنجاح!</h1>
        <p>
            لقد أرسلنا تعليمات إعادة تعيين كلمة المرور إلى بريدك الإلكتروني.<br>
            الرجاء تفقد صندوق الوارد أو مجلد البريد المزعج.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn-back" id="btn-go-login">
            <i class="fas fa-right-to-bracket"></i>
            العودة لتسجيل الدخول
        </a>
    </div>
</div>
</body>
</html>
