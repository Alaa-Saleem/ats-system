<!DOCTYPE html>
<html>
<head>
    <title>Delete Candidate</title>
</head>
<body>
    <h2>Are you sure you want to delete {{ candidate.full_name }}?</h2>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    <br>
    <a href="{% url 'candidates:candidate_list' %}">Cancel</a>
</body>
</html>
