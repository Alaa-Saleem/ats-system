<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Section</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── CSS Variables & Reset ── */
        :root {
            --primary: #c79d6a;
            --secondary: #343861;
            --bg: #faf8f5;
            --text: #1c1c2e;
            --text-muted: #6b6b80;
            --white: #ffffff;
            --shadow-lg: 0 16px 48px rgba(52, 56, 97, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            line-height: 1.2;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Scroll Animation ── */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 {
            transition-delay: 0.1s;
        }

        .reveal-delay-2 {
            transition-delay: 0.2s;
        }

        .reveal-delay-3 {
            transition-delay: 0.3s;
        }

        .reveal-delay-4 {
            transition-delay: 0.4s;
        }

        /* ── Section ── */
        .section {
            padding: 120px 0;
        }

        .section-header {
            text-align: center;
            max-width: 620px;
            margin: 0 auto 72px;
        }

        .section-header .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .section-header .eyebrow::before,
        .section-header .eyebrow::after {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--primary);
            opacity: 0.4;
        }

        .section-header h2 {
            font-size: 2.8rem;
            color: var(--secondary);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* ── Gallery Grid ── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .gallery-item {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.4s ease;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(52, 56, 97, 0.4) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: var(--radius-sm);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item .gallery-zoom {
            position: absolute;
            bottom: 12px;
            right: 12px;
            z-index: 2;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: var(--transition);
        }

        .gallery-item:hover .gallery-zoom {
            opacity: 1;
            transform: scale(1);
        }

        .gallery-zoom svg {
            width: 16px;
            height: 16px;
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(28, 28, 46, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-close svg {
            width: 20px;
            height: 20px;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            object-fit: contain;
            animation: lightbox-in 0.3s ease;
        }

        @keyframes lightbox-in {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-nav svg {
            width: 20px;
            height: 20px;
        }

        .lightbox-prev {
            left: 24px;
        }

        .lightbox-next {
            right: 24px;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-header h2 {
                font-size: 2rem;
            }

            .section {
                padding: 80px 0;
            }

            .lightbox-nav {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
        }
    </style>
</head>

    <script>
        // ── Gallery Section JS ──

        const galleryImages = [
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.49-2.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.50-4.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.51-6.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.51-4.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-4.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-1.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.45.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.48-2.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.48-1.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.47-2.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-2.jpeg',
            'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.50-2.jpeg'
        ];

        let currentImageIndex = 0;

        function openLightbox(index) {
            currentImageIndex = index;
            document.getElementById('lightboxImg').src = galleryImages[index];
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function prevImage(e) {
            e.stopPropagation();
            currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
            document.getElementById('lightboxImg').src = galleryImages[currentImageIndex];
        }

        function nextImage(e) {
            e.stopPropagation();
            currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
            document.getElementById('lightboxImg').src = galleryImages[currentImageIndex];
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage(e);
            if (e.key === 'ArrowRight') nextImage(e);
        });

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
