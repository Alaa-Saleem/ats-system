<!-- ═══ GALLERY SECTION – WordPress Custom HTML Widget ═══ -->
<link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

<style>
    .wg-gallery {
        padding: 120px 0;
        background: #faf8f5;
        font-family: 'Inter', sans-serif
    }

    .wg-gallery .wg-container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 24px
    }

    .wg-gallery .wg-sec-header {
        text-align: center;
        max-width: 620px;
        margin: 0 auto 72px
    }

    .wg-gallery .wg-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #c79d6a;
        font-size: .78rem;
        letter-spacing: .2em;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-weight: 600
    }

    .wg-gallery .wg-eyebrow::before,
    .wg-gallery .wg-eyebrow::after {
        content: '';
        width: 24px;
        height: 1px;
        background: #c79d6a;
        opacity: .4
    }

    .wg-gallery .wg-sec-header h2 {
        font-family: 'Playfair Display', serif;
        font-size: 2.8rem;
        color: #343861;
        margin-bottom: 16px;
        letter-spacing: -.02em;
        line-height: 1.2
    }

    .wg-gallery .wg-sec-header p {
        color: #6b6b80;
        font-size: 1.05rem;
        line-height: 1.7
    }

    .wg-gallery-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px
    }

    .wg-gallery-item {
        aspect-ratio: 1;
        overflow: hidden;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
        position: relative
    }

    .wg-gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform .6s ease, filter .4s ease
    }

    .wg-gallery-item::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 50%, rgba(52, 56, 97, .4) 100%);
        opacity: 0;
        transition: opacity .4s;
        border-radius: 10px
    }

    .wg-gallery-item:hover img {
        transform: scale(1.08)
    }

    .wg-gallery-item:hover::after {
        opacity: 1
    }

    .wg-gallery-zoom {
        position: absolute;
        bottom: 12px;
        right: 12px;
        z-index: 2;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .9);
        color: #343861;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(.8);
        transition: .4s
    }

    .wg-gallery-item:hover .wg-gallery-zoom {
        opacity: 1;
        transform: scale(1)
    }

    .wg-gallery-zoom svg {
        width: 16px;
        height: 16px
    }

    /* Lightbox */
    .wg-lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(28, 28, 46, .9);
        backdrop-filter: blur(16px);
        align-items: center;
        justify-content: center;
        padding: 24px
    }

    .wg-lightbox.active {
        display: flex
    }

    .wg-lb-close {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .1);
        border: 1px solid rgba(255, 255, 255, .15);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .4s
    }

    .wg-lb-close:hover {
        background: rgba(255, 255, 255, .2)
    }

    .wg-lb-close svg {
        width: 20px;
        height: 20px
    }

    .wg-lightbox img {
        max-width: 90%;
        max-height: 85vh;
        border-radius: 16px;
        object-fit: contain
    }

    .wg-lb-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .1);
        border: 1px solid rgba(255, 255, 255, .15);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .4s
    }

    .wg-lb-nav:hover {
        background: rgba(255, 255, 255, .2)
    }

    .wg-lb-nav svg {
        width: 20px;
        height: 20px
    }

    .wg-lb-prev {
        left: 24px
    }

    .wg-lb-next {
        right: 24px
    }

    @media(max-width:1024px) {
        .wg-gallery-grid {
            grid-template-columns: repeat(3, 1fr)
        }
    }

    @media(max-width:768px) {
        .wg-gallery-grid {
            grid-template-columns: repeat(2, 1fr)
        }

        .wg-gallery .wg-sec-header h2 {
            font-size: 2rem
        }

        .wg-gallery {
            padding: 80px 0
        }

        .wg-lb-nav {
            display: none
        }
    }

    @media(max-width:480px) {
        .wg-gallery-grid {
            gap: 8px
        }
    }
</style>

<!-- Lightbox -->
<div class="wg-lightbox" id="wg-lightbox" role="dialog" aria-modal="true">
    <button class="wg-lb-close" onclick="wgCloseLightbox()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
    <button class="wg-lb-nav wg-lb-prev" onclick="wgPrevImg(event)" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <img id="wgLightboxImg" src="" alt="Full view">
    <button class="wg-lb-nav wg-lb-next" onclick="wgNextImg(event)" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
</div>

<script>
    var wgImgs = ['https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.49-2.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.50-4.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.51-6.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.51-4.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-4.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-1.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.45.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.48-2.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.48-1.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.47-2.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-17-at-08.34.46-2.jpeg', 'https://d-alomran.com/wp-content/uploads/2026/02/WhatsApp-Image-2026-02-18-at-23.11.50-2.jpeg'];
    var wgIdx = 0;
    function wgOpenLightbox(i) { wgIdx = i; document.getElementById('wgLightboxImg').src = wgImgs[i]; document.getElementById('wg-lightbox').classList.add('active'); document.body.style.overflow = 'hidden'; }
    function wgCloseLightbox() { document.getElementById('wg-lightbox').classList.remove('active'); document.body.style.overflow = ''; }
    function wgPrevImg(e) { e.stopPropagation(); wgIdx = (wgIdx - 1 + wgImgs.length) % wgImgs.length; document.getElementById('wgLightboxImg').src = wgImgs[wgIdx]; }
    function wgNextImg(e) { e.stopPropagation(); wgIdx = (wgIdx + 1) % wgImgs.length; document.getElementById('wgLightboxImg').src = wgImgs[wgIdx]; }
    document.addEventListener('keydown', function (e) { if (!document.getElementById('wg-lightbox').classList.contains('active')) return; if (e.key === 'Escape') wgCloseLightbox(); if (e.key === 'ArrowLeft') wgPrevImg(e); if (e.key === 'ArrowRight') wgNextImg(e); });
</script>
